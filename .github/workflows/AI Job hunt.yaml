name: AI Job Application Pipeline

on:
  schedule:
    # 9:00 AM IST = 03:30 UTC
    - cron: '30 3 * * *'
    # 6:00 PM IST = 12:30 UTC
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Run Agent Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run pipeline
        env:
          # ── Required secrets ──
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          # ── JobSpy knobs (repo Variables, not Secrets — empty string is fine) ──
          JOBSPY_SITES: ${{ vars.JOBSPY_SITES }}
          JOBSPY_RESULTS_PER_SITE: ${{ vars.JOBSPY_RESULTS_PER_SITE }}
          JOBSPY_HOURS_OLD: ${{ vars.JOBSPY_HOURS_OLD }}
          JOBSPY_MAX_TERMS: ${{ vars.JOBSPY_MAX_TERMS }}
          # ── Per-purpose model overrides (repo Variables) ──
          MODEL_PROFILER: ${{ vars.MODEL_PROFILER }}
          MODEL_TAILORING: ${{ vars.MODEL_TAILORING }}
          MODEL_SCORER: ${{ vars.MODEL_SCORER }}
          # Route every ranked job through the Gemini tier (skip Claude tailoring).
          # Restore to "6" (or remove) to re-enable Claude for top-scored jobs.
          TOP_TIER_CLAUDE_COUNT: "0"
        run: python main.py

