name: Test Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - gemini-only
          - mock-all

jobs:
  test-pipeline:
    name: Test Pipeline (${{ inputs.mode }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: |
          if [ "${{ inputs.mode }}" = "gemini-only" ]; then
            python test_pipeline.py --gemini-only --max-jobs 5
          elif [ "${{ inputs.mode }}" = "mock-all" ]; then
            python test_pipeline.py --mock agent_0a,agent_0b,agent_0c,agent_1,agent_2,agent_3
          else
            python test_pipeline.py --max-jobs 5
          fi
