name: Test Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - gemini-only
          - mock-all

jobs:
  test-pipeline:
    name: Test Pipeline (${{ inputs.mode }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test pipeline
        env:
          # ── Required secrets ──
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ── JobSpy knobs (repo Variables) ──
          JOBSPY_SITES: ${{ vars.JOBSPY_SITES }}
          JOBSPY_RESULTS_PER_SITE: ${{ vars.JOBSPY_RESULTS_PER_SITE }}
          JOBSPY_HOURS_OLD: ${{ vars.JOBSPY_HOURS_OLD }}
          JOBSPY_MAX_TERMS: ${{ vars.JOBSPY_MAX_TERMS }}
          # ── Per-purpose model overrides (repo Variables) ──
          MODEL_PROFILER: ${{ vars.MODEL_PROFILER }}
          MODEL_TAILORING: ${{ vars.MODEL_TAILORING }}
          MODEL_SCORER: ${{ vars.MODEL_SCORER }}
          MODEL_PROFILER_GEMINI: ${{ vars.MODEL_PROFILER_GEMINI }}
          MODEL_TAILORING_GEMINI: ${{ vars.MODEL_TAILORING_GEMINI }}
        run: |
          if [ "${{ inputs.mode }}" = "gemini-only" ]; then
            python test_pipeline.py --gemini-only --max-jobs 5
          elif [ "${{ inputs.mode }}" = "mock-all" ]; then
            python test_pipeline.py --mock agent_0a,agent_0b,agent_0c,agent_1,agent_2,agent_3
          else
            python test_pipeline.py --max-jobs 5
          fi
